name: Build OpenWrt firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openwrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            gawk \
            gettext \
            libncurses-dev \
            libssl-dev \
            python3 \
            qemu-utils \
            rsync \
            unzip \
            xsltproc \
            zlib1g-dev \
            zstd

      - name: Verify executable files
        run: |
          test -x builder/build.sh
          test -x scripts/convert-vmdk.sh
          test -x files/usr/libexec/package-manager-call

      - name: Build firmware and delivery artifacts
        run: ./builder/build.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openwrt-x86-64-efi
          path: dist/*
          if-no-files-found: error
          retention-days: 14
